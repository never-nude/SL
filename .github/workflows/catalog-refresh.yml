name: Refresh Catalog

on:
  workflow_dispatch:
  schedule:
    - cron: "0 14 * * 1"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build generated catalog and artwork
        run: python3 scripts/build_mass_catalog.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No catalog changes to commit"
            exit 0
          fi
          git add catalog_generated.js artwork_overrides_generated.js catalog_build_report.json
          git commit -m "chore: refresh generated catalog and artwork"
          git push
